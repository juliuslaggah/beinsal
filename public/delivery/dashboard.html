<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BeinSal - Delivery Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .status-shipped { background-color: #dbeafe; color: #2563eb; }
        .status-delivered { background-color: #d1fae5; color: #059669; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-8">
    <!-- Header -->
    <div class="bg-[#800020] text-white p-4 sticky top-0 z-10 shadow-md">
        <div class="flex items-center justify-between max-w-6xl mx-auto">
            <div class="flex items-center gap-3">
                <i data-lucide="truck" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold">Delivery Dashboard</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="delivery-name" class="text-sm">Loading...</span>
                <button onclick="logout()" class="bg-white text-[#800020] px-3 py-1 rounded-lg text-sm font-semibold">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Welcome Card -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#800020] rounded-full flex items-center justify-center">
                    <i data-lucide="user" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h2 id="welcome-name" class="font-bold text-lg">Welcome!</h2>
                    <p id="delivery-zone" class="text-sm text-gray-500">Zone: Loading...</p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-2xl font-bold text-[#800020]" id="total-orders">0</p>
                <p class="text-xs text-gray-500">Total Assigned</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-2xl font-bold text-blue-600" id="pending-orders">0</p>
                <p class="text-xs text-gray-500">Pending Delivery</p>
            </div>
        </div>

        <!-- Orders List -->
        <h2 class="font-semibold text-lg mb-3">Orders for Delivery</h2>
        <div id="orders-container" class="space-y-3">
            <div class="text-center text-gray-500 py-8">Loading orders...</div>
        </div>
    </div>

    <!-- Confirm Delivery Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-sm">
            <div class="p-4 border-b">
                <h3 class="font-bold text-lg">Confirm Delivery</h3>
            </div>
            <div class="p-4">
                <p class="text-sm text-gray-600 mb-3">Order ID: <span id="confirm-order-id" class="font-mono"></span></p>
                <label class="block text-sm font-medium mb-2">Enter Delivery Code</label>
                <input type="text" id="delivery-code" class="w-full border rounded-lg p-3 text-center text-2xl tracking-widest" placeholder="000000" maxlength="6">
                <p class="text-xs text-gray-400 mt-2">Ask customer for the delivery code shown in their order</p>
                <div class="flex gap-3 mt-4">
                    <button onclick="closeConfirmModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">Cancel</button>
                    <button onclick="confirmDelivery()" class="flex-1 bg-[#800020] text-white py-2 rounded-lg">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentOrders = [];
        let selectedOrderId = null;
        let deliveryPerson = null;

        // Check if logged in
        function checkAuth() {
            const token = localStorage.getItem('deliveryToken');
            if (!token) {
                window.location.href = '/delivery/login.html';
                return false;
            }
            return true;
        }

        // Load delivery person info
        function loadDeliveryInfo() {
            const deliveryStr = localStorage.getItem('deliveryPerson');
            if (deliveryStr) {
                deliveryPerson = JSON.parse(deliveryStr);
                document.getElementById('welcome-name').textContent = `Welcome, ${deliveryPerson.name}`;
                document.getElementById('delivery-name').textContent = deliveryPerson.name;
                document.getElementById('delivery-zone').textContent = `Zone: ${deliveryPerson.zone}`;
            }
        }

        // Load orders from localStorage
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('beinSalOrders') || '[]');
            // Get only shipped orders
            const shippedOrders = orders.filter(order => order.status === 'shipped');
            currentOrders = shippedOrders;
            
            updateStats();
            displayOrders();
        }

        // Update stats
        function updateStats() {
            document.getElementById('total-orders').textContent = currentOrders.length;
            document.getElementById('pending-orders').textContent = currentOrders.length;
        }

        // Display orders (no delivery code shown to delivery person)
        function displayOrders() {
            const container = document.getElementById('orders-container');
            
            if (currentOrders.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-8 text-center">
                        <i data-lucide="package" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                        <p class="text-gray-500">No orders assigned for delivery</p>
                        <p class="text-xs text-gray-400 mt-1">Check back later for new deliveries</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            container.innerHTML = currentOrders.map(order => {
                const date = new Date(order.date).toLocaleDateString();
                const itemCount = order.items.reduce((sum, item) => sum + item.quantity, 0);
                
                return `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden">
                        <div class="p-4 border-b bg-gray-50 flex flex-wrap justify-between items-center gap-2">
                            <div>
                                <p class="font-mono text-sm font-semibold">${order.orderId}</p>
                                <p class="text-xs text-gray-500">${date}</p>
                            </div>
                            <span class="text-xs px-2 py-1 rounded-full status-shipped">Ready for Delivery</span>
                        </div>
                        <div class="p-4">
                            <div class="mb-2">
                                <p class="font-semibold">${escapeHtml(order.deliveryAddress.fullName)}</p>
                                <p class="text-sm text-gray-600">${escapeHtml(order.deliveryAddress.phone)}</p>
                                <p class="text-sm text-gray-600">${escapeHtml(order.deliveryAddress.street)}, ${escapeHtml(order.deliveryAddress.city)}</p>
                                ${order.deliveryAddress.landmark ? `<p class="text-sm text-gray-500">Landmark: ${escapeHtml(order.deliveryAddress.landmark)}</p>` : ''}
                            </div>
                            <div class="border-t pt-2 mt-2">
                                <p class="text-xs text-gray-500 mb-1">${itemCount} item(s) · Total: ${order.total.toLocaleString()} SLL</p>
                                <div class="flex flex-wrap gap-1">
                                    ${order.items.slice(0, 2).map(item => `
                                        <span class="text-xs bg-gray-100 px-2 py-1 rounded">${escapeHtml(item.name)} (${item.size}) x${item.quantity}</span>
                                    `).join('')}
                                    ${order.items.length > 2 ? `<span class="text-xs bg-gray-100 px-2 py-1 rounded">+${order.items.length - 2} more</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="p-3 border-t bg-gray-50">
                            <button onclick="openConfirmModal('${order.orderId}')" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">
                                Mark as Delivered
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        // Open confirm delivery modal
        function openConfirmModal(orderId) {
            selectedOrderId = orderId;
            document.getElementById('confirm-order-id').textContent = orderId;
            document.getElementById('delivery-code').value = '';
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
            selectedOrderId = null;
        }

        // Confirm delivery with code (delivery person enters code provided by customer)
        function confirmDelivery() {
            const code = document.getElementById('delivery-code').value.trim();
            
            if (!code || code.length !== 6) {
                alert('Please enter the 6-digit delivery code');
                return;
            }
            
            if (!selectedOrderId) {
                alert('No order selected');
                return;
            }
            
            // Get orders from localStorage
            const orders = JSON.parse(localStorage.getItem('beinSalOrders') || '[]');
            const orderIndex = orders.findIndex(o => o.orderId === selectedOrderId);
            
            if (orderIndex === -1) {
                alert('Order not found');
                closeConfirmModal();
                return;
            }
            
            const order = orders[orderIndex];
            
            // Check if order has delivery code (generated by admin when status changed to shipped)
            if (!order.deliveryCode) {
                alert('No delivery code assigned to this order. Please contact admin.');
                closeConfirmModal();
                return;
            }
            
            // Verify the code entered by delivery person matches the order's delivery code
            if (order.deliveryCode !== code) {
                alert('Invalid delivery code. Please check with the customer.');
                return;
            }
            
            // Update order status to delivered
            orders[orderIndex].status = 'delivered';
            orders[orderIndex].deliveredAt = new Date().toISOString();
            localStorage.setItem('beinSalOrders', JSON.stringify(orders));
            
            alert('Delivery confirmed! Order marked as delivered.');
            closeConfirmModal();
            
            // Refresh orders list
            loadOrders();
        }

        // Logout
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('deliveryToken');
                localStorage.removeItem('deliveryPerson');
                window.location.href = '/delivery/login.html';
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        if (checkAuth()) {
            loadDeliveryInfo();
            loadOrders();
        }
        
        // Refresh orders every 30 seconds
        setInterval(() => {
            if (checkAuth()) {
                loadOrders();
            }
        }, 30000);
    </script>
</body>
</html>
