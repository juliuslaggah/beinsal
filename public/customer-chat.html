<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BeinSal - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <!-- Maroon header bar -->
    <div class="bg-[#800020] text-white p-4 sticky top-0 z-10 shadow-md flex items-center gap-4">
        <button onclick="window.location.href='/'" class="text-white">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h1 class="text-xl font-bold flex-1 text-center">Customer Service</h1>
        <div id="admin-status" class="flex items-center gap-1">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-400"></div>
            <span id="status-text" class="text-xs">Offline</span>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3" id="chat-messages">
        <div class="text-center text-gray-400 text-sm">Loading messages...</div>
    </div>

    <!-- Message Input -->
    <div class="bg-white border-t border-gray-200 p-3">
        <div class="flex gap-2">
            <input type="text" id="message-input" placeholder="Type your message..." class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:border-[#800020]">
            <button onclick="sendMessage()" class="bg-[#800020] text-white rounded-full w-10 h-10 flex items-center justify-center">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </div>
        <p id="status-message" class="text-xs text-gray-400 text-center mt-2">Connecting to support...</p>
    </div>

    <!-- Bottom navigation bar -->
    <div class="bg-white border-t border-gray-200 shadow-lg">
        <div class="flex justify-around items-center py-2 max-w-md mx-auto">
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="window.location.href='/'">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Search</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="window.location.href='/cart.html'">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Cart</span>
                <span id="cart-count" class="absolute text-xs bg-red-500 text-white rounded-full px-1 -mt-1 ml-3 hidden">0</span>
            </div>
            <div class="flex flex-col items-center text-[#800020] cursor-pointer" onclick="window.location.href='/chat.html'">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Chat</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="window.location.href='/account.html'">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Account</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let socket = null;
        let currentUser = null;
        let messages = [];
        let adminOnline = false;

        // Check if user is logged in
        function isLoggedIn() {
            return localStorage.getItem('isLoggedIn') === 'true';
        }

        // Load user data
        function loadUser() {
            const userStr = localStorage.getItem('beinSalUser');
            if (userStr) {
                currentUser = JSON.parse(userStr);
            }
        }

        // Initialize Socket.io connection
        function initSocket() {
            socket = io();
            
            // Register user with socket
            const userId = currentUser ? currentUser.phone : 'guest';
            socket.emit('user-login', userId);
            
            // Listen for admin status updates
            socket.on('admin-status', (data) => {
                adminOnline = data.online;
                updateAdminStatus();
            });
            
            // Listen for admin replies
            socket.on('admin-reply', (data) => {
                const adminMsg = {
                    id: Date.now(),
                    sender: 'support',
                    text: data.message,
                    time: data.timestamp,
                    read: true
                };
                messages.push(adminMsg);
                saveMessages();
                displayMessages();
            });
            
            // Load chat history from server
            socket.emit('get-chat-history', userId, (history) => {
                if (history && history.length > 0) {
                    // Convert server message format to display format
                    messages = history.map(msg => ({
                        id: Date.now() + Math.random(),
                        sender: msg.sender === 'admin' ? 'support' : 'user',
                        text: msg.text,
                        time: msg.timestamp,
                        read: true
                    }));
                    saveMessages();
                    displayMessages();
                } else if (messages.length === 0) {
                    // No history, add welcome message
                    messages = [
                        {
                            id: Date.now(),
                            sender: 'support',
                            text: 'Welcome to BeinSal Customer Support! How can we help you today?',
                            time: new Date().toISOString(),
                            read: true
                        }
                    ];
                    saveMessages();
                    displayMessages();
                } else {
                    displayMessages();
                }
            });
        }

        // Update admin status display
        function updateAdminStatus() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const statusMsg = document.getElementById('status-message');
            
            if (adminOnline) {
                statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
                statusText.textContent = 'Online';
                statusMsg.textContent = 'Support is online. You will receive real-time replies.';
                statusMsg.className = 'text-xs text-green-600 text-center mt-2';
            } else {
                statusDot.className = 'w-2 h-2 rounded-full bg-gray-400';
                statusText.textContent = 'Offline';
                statusMsg.textContent = 'Support is offline. Your message will be saved and replied to when support comes online.';
                statusMsg.className = 'text-xs text-orange-500 text-center mt-2';
            }
        }

        // Load chat messages from localStorage
        function loadMessages() {
            const userId = currentUser ? currentUser.phone : 'guest';
            const savedMessages = localStorage.getItem(`chat_${userId}`);
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            }
            displayMessages();
        }

        // Save messages to localStorage
        function saveMessages() {
            const userId = currentUser ? currentUser.phone : 'guest';
            localStorage.setItem(`chat_${userId}`, JSON.stringify(messages));
        }

        // Display messages in chat
        function displayMessages() {
            const container = document.getElementById('chat-messages');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 text-sm">No messages yet. Start a conversation!</div>';
                return;
            }

            container.innerHTML = messages.map(msg => {
                const isSupport = msg.sender === 'support';
                const time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                if (isSupport) {
                    return `
                        <div class="flex justify-start">
                            <div class="bg-gray-200 rounded-lg rounded-bl-none px-4 py-2 max-w-[75%]">
                                <p class="text-sm">${escapeHtml(msg.text)}</p>
                                <p class="text-xs text-gray-500 mt-1">${time}</p>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="flex justify-end">
                            <div class="bg-[#800020] text-white rounded-lg rounded-br-none px-4 py-2 max-w-[75%]">
                                <p class="text-sm">${escapeHtml(msg.text)}</p>
                                <p class="text-xs text-white opacity-70 mt-1">${time}</p>
                            </div>
                        </div>
                    `;
                }
            }).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
            
            // Recreate icons if any
            lucide.createIcons();
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Send message via WebSocket
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) return;
            if (!socket) {
                alert('Connecting to chat server. Please wait.');
                return;
            }
            
            const userId = currentUser ? currentUser.phone : 'guest';
            const userName = currentUser ? currentUser.fullName : 'Guest';
            const timestamp = new Date().toISOString();
            
            // Add user message to display
            const userMsg = {
                id: Date.now(),
                sender: 'user',
                text: text,
                time: timestamp,
                read: true
            };
            messages.push(userMsg);
            saveMessages();
            displayMessages();
            
            // Clear input
            input.value = '';
            
            // Send to server via WebSocket
            socket.emit('customer-message', {
                userId: userId,
                userName: userName,
                message: text,
                timestamp: timestamp
            });
        }

        // Update cart count
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.length;
            const badge = document.getElementById('cart-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Redirect to login if not logged in
        function checkAuth() {
            if (!isLoggedIn()) {
                localStorage.setItem('redirectAfterLogin', '/chat.html');
                window.location.href = '/register.html';
                return false;
            }
            return true;
        }

        // Initialize
        if (checkAuth()) {
            loadUser();
            loadMessages();
            updateCartCount();
            initSocket();
        }
    </script>
</body>
</html>
