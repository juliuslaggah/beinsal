<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BeinSal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom responsive adjustments */
        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr) !important;
            }
        }
        @media (min-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr) !important;
            }
        }
        .product-card {
            cursor: pointer;
        }
        /* Search modal styles */
        .search-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
        }
        .search-modal.active {
            display: flex;
        }
        .search-container {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .search-input-wrapper {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            gap: 8px;
        }
        .search-input-wrapper input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        .search-input-wrapper input:focus {
            border-color: #800020;
        }
        .search-results {
            max-height: 400px;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 12px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .search-result-item:hover {
            background-color: #f9fafb;
        }
        .search-result-icon {
            width: 40px;
            height: 40px;
            background-color: #f3f4f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-result-info h4 {
            font-size: 14px;
            font-weight: 500;
        }
        .search-result-info p {
            font-size: 12px;
            color: #800020;
            font-weight: bold;
        }
        .no-results {
            padding: 20px;
            text-align: center;
            color: #9ca3af;
        }
    </style>
</head>
<body class="pb-20 bg-gray-50">
    <!-- Maroon header bar -->
    <div class="bg-[#800020] text-white p-4 sticky top-0 z-10 shadow-md">
        <h1 class="text-2xl font-bold text-center">BeinSal</h1>
    </div>

    <!-- Top navigation bar (10 categories - horizontal scroll) -->
    <div class="border-b border-gray-200 bg-white overflow-x-auto whitespace-nowrap sticky top-[72px] z-10">
        <div class="inline-flex space-x-5 px-4 py-3">
            <span class="text-[#800020] font-semibold border-b-2 border-[#800020] pb-1" data-cat="all">Recommended</span>
            <span class="text-gray-600" data-cat="Ladies Wear">Ladies Wear</span>
            <span class="text-gray-600" data-cat="Ladies Shoes">Ladies Shoes</span>
            <span class="text-gray-600" data-cat="Ladies Bags">Ladies Bags</span>
            <span class="text-gray-600" data-cat="Ladies Accessories">Ladies Accessories</span>
            <span class="text-gray-600" data-cat="Men Wear">Men Wear</span>
            <span class="text-gray-600" data-cat="Men Shoes">Men Shoes</span>
            <span class="text-gray-600" data-cat="Men Bags">Men Bags</span>
            <span class="text-gray-600" data-cat="Men Accessories">Men Accessories</span>
            <span class="text-gray-600" data-cat="Children">Children</span>
            <span class="text-gray-600" data-cat="Unisex">Unisex</span>
        </div>
    </div>

    <!-- Main content - Product grid -->
    <div class="container mx-auto px-2 sm:px-4 py-4">
        <div id="products" class="product-grid grid grid-cols-2 gap-3 sm:gap-4">
            <div class="col-span-full text-center text-gray-500">Loading products...</div>
        </div>
    </div>

    <!-- Recently Viewed Section -->
    <div class="container mx-auto px-2 sm:px-4 py-4 mt-2">
        <h2 class="text-lg font-semibold mb-3">Recently Viewed</h2>
        <div id="recently-viewed" class="grid grid-cols-2 gap-3 sm:gap-4">
            <div class="col-span-full text-center text-gray-500 text-sm">No recently viewed items</div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="search-modal" onclick="closeSearchModal(event)">
        <div class="search-container" onclick="event.stopPropagation()">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="Search products..." autocomplete="off">
                <button onclick="closeSearchModal()" class="text-gray-500 hover:text-gray-700">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="search-results" class="search-results">
                <div class="no-results">Type to search products</div>
            </div>
        </div>
    </div>

    <!-- Bottom navigation bar (fixed) -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg">
        <div class="flex justify-around items-center py-2 max-w-md mx-auto">
            <div class="flex flex-col items-center text-[#800020] cursor-pointer" onclick="window.location.href='/'">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="openSearchModal()">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Search</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="window.location.href='/cart.html'">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Cart</span>
                <span id="cart-count" class="absolute text-xs bg-red-500 text-white rounded-full px-1 -mt-1 ml-3 hidden">0</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="window.location.href='/customer-chat.html'">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Chat</span>
            </div>
            <div class="flex flex-col items-center text-gray-500 cursor-pointer" onclick="window.location.href='/account.html'">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-xs mt-1">Account</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let allProducts = [];

        // Load products from server
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                allProducts = await response.json();
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('products').innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load products. Please refresh.</div>';
            }
        }

        // Display products (without size dropdown)
        function displayProducts(products) {
            const container = document.getElementById('products');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-500">No products found</div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition product-card" onclick="goToProduct(${product.id})">
                    <div class="h-32 sm:h-40 bg-gray-200 flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="w-8 h-8 sm:w-10 sm:h-10 text-gray-400"></i>
                    </div>
                    <div class="p-2 sm:p-3">
                        <h3 class="font-semibold text-xs sm:text-sm line-clamp-2">${escapeHtml(product.name)}</h3>
                        <p class="text-[#800020] font-bold text-sm sm:text-base mt-1">${product.price.toLocaleString()} SLL</p>
                        <p class="text-xs text-gray-500 mt-2">Sold ${product.sold.toLocaleString()} units</p>
                        <p class="text-xs text-green-600">Arrives in ${product.shippingDays} days</p>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // Navigate to product detail page
        function goToProduct(productId) {
            window.location.href = `/product.html?id=${productId}`;
        }

        // Update cart count badge
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.length;
            const badge = document.getElementById('cart-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Track recently viewed
        function trackRecentlyViewed(productId) {
            let recent = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
            recent = recent.filter(id => id !== productId);
            recent.unshift(productId);
            recent = recent.slice(0, 6);
            localStorage.setItem('recentlyViewed', JSON.stringify(recent));
        }

        // Load recently viewed
        async function loadRecentlyViewed() {
            const recent = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
            if (recent.length === 0) {
                document.getElementById('recently-viewed').innerHTML = '<div class="col-span-full text-center text-gray-500 text-sm">No recently viewed items</div>';
                return;
            }
            
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                const recentProducts = products.filter(p => recent.includes(p.id));
                
                if (recentProducts.length === 0) {
                    document.getElementById('recently-viewed').innerHTML = '<div class="col-span-full text-center text-gray-500 text-sm">No recently viewed items</div>';
                } else {
                    document.getElementById('recently-viewed').innerHTML = recentProducts.map(product => `
                        <div class="bg-white rounded-lg shadow-md p-2 sm:p-3 cursor-pointer" onclick="goToProduct(${product.id})">
                            <h3 class="font-semibold text-xs sm:text-sm">${escapeHtml(product.name)}</h3>
                            <p class="text-[#800020] font-bold text-xs sm:text-sm mt-1">${product.price.toLocaleString()} SLL</p>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading recently viewed:', error);
            }
        }

        // Category filter
        function setupCategoryFilters() {
            const categories = document.querySelectorAll('[data-cat]');
            categories.forEach(cat => {
                cat.addEventListener('click', () => {
                    const selectedCat = cat.getAttribute('data-cat');
                    categories.forEach(c => {
                        c.classList.remove('text-[#800020]', 'font-semibold', 'border-b-2', 'border-[#800020]');
                        c.classList.add('text-gray-600');
                    });
                    cat.classList.add('text-[#800020]', 'font-semibold', 'border-b-2', 'border-[#800020]');
                    cat.classList.remove('text-gray-600');
                    
                    if (selectedCat === 'all') {
                        displayProducts(allProducts);
                    } else {
                        const filtered = allProducts.filter(p => p.category === selectedCat);
                        displayProducts(filtered);
                    }
                });
            });
        }

        // ========== SEARCH FUNCTIONALITY ==========
        function openSearchModal() {
            const modal = document.getElementById('search-modal');
            modal.classList.add('active');
            document.getElementById('search-input').focus();
            lucide.createIcons();
        }

        function closeSearchModal(event) {
            const modal = document.getElementById('search-modal');
            modal.classList.remove('active');
            document.getElementById('search-input').value = '';
            document.getElementById('search-results').innerHTML = '<div class="no-results">Type to search products</div>';
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            
            if (query === '') {
                resultsContainer.innerHTML = '<div class="no-results">Type to search products</div>';
                return;
            }
            
            const filtered = allProducts.filter(product => 
                product.name.toLowerCase().includes(query) ||
                product.category.toLowerCase().includes(query)
            );
            
            if (filtered.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">No products found for "' + escapeHtml(query) + '"</div>';
                return;
            }
            
            resultsContainer.innerHTML = filtered.map(product => `
                <div class="search-result-item" onclick="goToProduct(${product.id})">
                    <div class="search-result-icon">
                        <i data-lucide="shopping-bag" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <div class="search-result-info flex-1">
                        <h4>${escapeHtml(product.name)}</h4>
                        <p>${product.price.toLocaleString()} SLL</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search input event listener
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', performSearch);
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const firstResult = document.querySelector('.search-result-item');
                        if (firstResult) {
                            firstResult.click();
                        }
                    }
                });
            }
        });

        // Initialize
        loadProducts();
        loadRecentlyViewed();
        updateCartCount();
        setTimeout(setupCategoryFilters, 500);
    </script>
</body>
</html>
